[tool:pytest]
testpaths = tests
asyncio_mode = auto
addopts = -ra
# Put the repo root on sys.path so `import src...` works under a bare `pytest`
# invocation (CI runs `pytest` without PYTHONPATH set). Requires pytest >= 7.
pythonpath = .

[coverage:run]
source = src
omit =
    src/__init__.py
    src/**/__init__.py
    tests/*

[coverage:report]
fail_under = 80
show_missing = True
