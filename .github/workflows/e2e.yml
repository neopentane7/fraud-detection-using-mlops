name: E2E Smoke

# Runs the FULL MLOps loop for real — train -> register -> promote -> serve ->
# /predict — on a tiny synthetic dataset with a local SQLite MLflow registry.
# No secrets, no external data: a genuine end-to-end run, not a no-op.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install training + serving deps
        run: pip install -r requirements.txt -r requirements-api.txt

      - name: End-to-end smoke (train -> register -> promote -> serve -> /predict)
        run: python scripts/e2e_smoke.py
