name: Retrain

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why retraining was triggered"
        required: false
        default: "manual"
  # Triggered programmatically by the monitor workflow on drift.
  repository_dispatch:
    types: [drift-retrain]

permissions:
  contents: read

jobs:
  retrain:
    runs-on: ubuntu-latest
    env:
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Reproduce pipeline from preprocess onwards
        run: dvc repro preprocess train evaluate

      - name: Compare challenger vs Production and promote if it wins by >= 2%
        run: python scripts/promote_model.py --compare --min-delta 0.02

      - name: Write run summary
        if: always()
        run: |
          {
            echo "## Retrain summary"
            echo "Trigger: ${{ github.event.inputs.reason || github.event.action }}"
            echo ""
            echo '```json'
            cat metrics/eval_metrics.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
