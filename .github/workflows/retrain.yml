name: Retrain

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why retraining was triggered"
        required: false
        default: "manual"
  # Triggered programmatically by the monitor workflow on drift.
  repository_dispatch:
    types: [drift-retrain]

permissions:
  contents: read

jobs:
  retrain:
    runs-on: ubuntu-latest
    env:
      KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
      KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      PYTHONPATH: ${{ github.workspace }}  # so dvc-run scripts / promote_model import src
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # The retrain-and-promote loop needs a real MLflow tracking server (a file
      # store has no model registry, so nothing can be promoted). It therefore
      # runs only when MLFLOW_TRACKING_URI is configured; otherwise the job is a
      # clean no-op that passes.
      - name: Reproduce pipeline from preprocess onwards
        if: ${{ env.MLFLOW_TRACKING_URI != '' }}
        run: dvc repro preprocess train evaluate

      - name: Compare challenger vs Production and promote if it wins by >= 2%
        if: ${{ env.MLFLOW_TRACKING_URI != '' }}
        run: python scripts/promote_model.py --compare --min-delta 0.02

      - name: Write run summary
        if: ${{ env.MLFLOW_TRACKING_URI != '' }}
        run: |
          {
            echo "## Retrain summary"
            echo "Trigger: ${{ github.event.inputs.reason || github.event.action }}"
            echo ""
            echo '```json'
            cat metrics/creditcard/eval_metrics.json 2>/dev/null || echo "(no metrics produced)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
